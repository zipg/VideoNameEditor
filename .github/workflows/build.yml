name: build-installers

on:
  workflow_dispatch:
  push:
    branches:
      - "**"
    tags:
      - "v*"
  pull_request:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-15-intel
            target: x86_64-apple-darwin
          - os: macos-14
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install dependencies
        run: npm ci

      - name: Prepare ffprobe sidecar
        run: npm run prepare:ffprobe -- ${{ matrix.target }}

      - name: Build installers
        run: npm run tauri build -- --target ${{ matrix.target }}

      - name: Prepare macOS artifacts
        if: startsWith(matrix.target, 'aarch64-apple') || startsWith(matrix.target, 'x86_64-apple')
        run: |
          rm -rf artifacts
          mkdir -p artifacts
          dmg_path="$(ls src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg | head -n 1)"
          rw_base="${dmg_path%.dmg}-rw"
          rw_dmg="${rw_base}.dmg"
          final_base="${dmg_path%.dmg}-with-readme"
          final_dmg="${final_base}.dmg"
          attach_plist="$(mktemp)"

          hdiutil convert "$dmg_path" -format UDRW -o "$rw_base"
          hdiutil attach "$rw_dmg" -readwrite -noverify -noautoopen -plist > "$attach_plist"
          mount_point="$(python3 -c 'import plistlib, sys; data = plistlib.load(open(sys.argv[1], "rb")); print(next(entity["mount-point"] for entity in data.get("system-entities", []) if entity.get("mount-point")))' "$attach_plist")"

          cp "release/首次运行前先看我.txt" "$mount_point/"
          sync
          hdiutil detach "$mount_point"
          hdiutil convert "$rw_dmg" -format UDZO -o "$final_base"
          mv "$final_dmg" "$dmg_path"
          rm -f "$rw_dmg" "$attach_plist"
          cp "$dmg_path" artifacts/

      - name: Prepare Windows artifacts
        if: startsWith(matrix.target, 'x86_64-pc-windows')
        shell: pwsh
        run: |
          Remove-Item -Recurse -Force artifacts -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Path artifacts | Out-Null
          Copy-Item src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.exe artifacts/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: installers-${{ matrix.target }}
          path: artifacts/**
